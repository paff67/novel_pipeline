  "resource_pressure",
  "institutional_pipeline",
  "gray_labor",
  "family_survival",
  "asset_repricing",
]
downstream_shape = "Emit concrete trigger -> constraint rules that explain how action is gated."
slot_match_threshold = 0.70
soft_slot_match_floor = 0.62
prompt_hints = [
  "Prefer action engines driven by cost, procedure, screening, or repayment gates.",
  "Do not collapse multiple engines into one generic pressure summary.",
]

