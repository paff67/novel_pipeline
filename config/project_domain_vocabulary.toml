[mechanism_prototypes]
routing_hints = [
  "当问题询问具体制度节点时，路由到对应 worldbook 条目，并返回审批链、资格门槛或责任节点。",
  "当问题涉及回款、放行、审批、筛选或名额卡点时，优先返回触发条件与执行后果。",
]
rag_worthy = [
  "把可反复复用的机构、流程、门槛、资源限制沉淀成稳定原子设定。",
  "优先沉淀资格条件、流程步骤、配额规则、赔偿规则和资源约束。",
]
worldbook_worthy = [
  "把长期稳定、可跨章节查询的制度常识、实体关系和约束写成可独立入库的原子规则。",
]
negative_rules = [
  "禁止把制度惩罚、欠款压力、羞辱触发器写成抽象情绪。",
  "改为先写清卡点、门槛、流程、代价，再写角色动作如何被推迟、拒绝或改道。",
]
constraint_rules = [
  "规则优先写成 trigger -> constraint 的动作句，而不是栏目标题或主题词。",
]
scalar_rules = [
  "标量路径只输出 canonical enum token，不夹带解释性长句。",
]

